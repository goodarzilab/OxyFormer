<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#475569"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="560" y="44" text-anchor="middle" font-size="25" font-weight="bold" font-family="Arial, Helvetica, sans-serif">Technical causal-AI architecture</text><text x="560" y="68" text-anchor="middle" font-size="13" fill="#334155" font-family="Arial, Helvetica, sans-serif">A pretrained attention-based tabular encoder feeds an orthogonal continuous-treatment DML estimator.</text><rect x="70" y="130" width="280" height="84" rx="18" fill="#e0f2fe" stroke="#0f172a" stroke-width="1.3"/><text x="86" y="158" font-size="17" font-weight="bold" font-family="Arial, Helvetica, sans-serif">1. Exposure proxy</text><text x="86" y="184" font-size="12.5" fill="#334155" font-family="Arial, Helvetica, sans-serif">Elevation -&gt; pressure -&gt; hypoxia burden</text><rect x="70" y="280" width="280" height="84" rx="18" fill="#e0f2fe" stroke="#0f172a" stroke-width="1.3"/><text x="86" y="308" font-size="17" font-weight="bold" font-family="Arial, Helvetica, sans-serif">2. County table</text><text x="86" y="334" font-size="12.5" fill="#334155" font-family="Arial, Helvetica, sans-serif">Public + local health covariates</text><rect x="420" y="130" width="280" height="84" rx="18" fill="#dcfce7" stroke="#0f172a" stroke-width="1.3"/><text x="436" y="158" font-size="17" font-weight="bold" font-family="Arial, Helvetica, sans-serif">3. Transformer pretraining</text><text x="436" y="184" font-size="12.5" fill="#334155" font-family="Arial, Helvetica, sans-serif">Tokens, self-attention, masked views</text><rect x="420" y="280" width="280" height="84" rx="18" fill="#dcfce7" stroke="#0f172a" stroke-width="1.3"/><text x="436" y="308" font-size="17" font-weight="bold" font-family="Arial, Helvetica, sans-serif">4. Embedding transfer</text><text x="436" y="334" font-size="12.5" fill="#334155" font-family="Arial, Helvetica, sans-serif">Learn z_i and append it to X_i</text><rect x="770" y="130" width="280" height="84" rx="18" fill="#fef3c7" stroke="#0f172a" stroke-width="1.3"/><text x="786" y="158" font-size="17" font-weight="bold" font-family="Arial, Helvetica, sans-serif">5. DML causal head</text><text x="786" y="184" font-size="12.5" fill="#334155" font-family="Arial, Helvetica, sans-serif">Orthogonal total and direct effects</text><rect x="770" y="280" width="280" height="84" rx="18" fill="#fef3c7" stroke="#0f172a" stroke-width="1.3"/><text x="786" y="308" font-size="17" font-weight="bold" font-family="Arial, Helvetica, sans-serif">6. Endpoint reuse</text><text x="786" y="334" font-size="12.5" fill="#334155" font-family="Arial, Helvetica, sans-serif">All-cancer, site effects, scale-up</text><line x1="350" y1="176" x2="420" y2="176" stroke="#475569" stroke-width="2.6" marker-end="url(#arrowhead)"/><line x1="350" y1="336" x2="420" y2="336" stroke="#475569" stroke-width="2.6" marker-end="url(#arrowhead)"/><line x1="700" y1="176" x2="770" y2="176" stroke="#475569" stroke-width="2.6" marker-end="url(#arrowhead)"/><line x1="700" y1="336" x2="770" y2="336" stroke="#475569" stroke-width="2.6" marker-end="url(#arrowhead)"/><line x1="560" y1="222" x2="560" y2="290" stroke="#475569" stroke-width="2.6" marker-end="url(#arrowhead)"/><line x1="910" y1="222" x2="910" y2="290" stroke="#475569" stroke-width="2.6" marker-end="url(#arrowhead)"/><rect x="182" y="435" width="756" height="78" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2"/><text x="560" y="464" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial, Helvetica, sans-serif">Why this counts as causal AI</text><text x="560" y="489" text-anchor="middle" font-size="12.5" fill="#334155" font-family="Arial, Helvetica, sans-serif">AI: learned tabular representation, self-attention, masked-view pretraining, endpoint transfer.</text><text x="560" y="508" text-anchor="middle" font-size="12.5" fill="#334155" font-family="Arial, Helvetica, sans-serif">Causal: explicit treatment, transferred confounder representation, orthogonal score, mediator-aware estimands.</text></svg>